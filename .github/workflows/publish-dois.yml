name: Publish Schema DOIs

# Mints / updates Zenodo DOIs for the library schemas under public/schemas and
# commits the resulting doi-mapping.json back to main. The frontend reads that
# mapping to display each schema's DOI. See .github/scripts/publish-zenodo.py.

on:
  push:
    branches: [main]
    paths:
      - 'public/schemas/**'
      - '.github/scripts/publish-zenodo.py'
      - '.github/workflows/publish-dois.yml'
  workflow_dispatch:
    inputs:
      zenodo_target:
        description: 'Zenodo target environment'
        required: true
        default: 'sandbox'
        type: choice
        options:
          - sandbox
          - production

concurrency:
  group: 'publish-dois'
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve Zenodo target
        id: target
        run: |
          target="${{ github.event.inputs.zenodo_target }}"
          if [ -z "$target" ]; then target="sandbox"; fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          if [ "$target" = "production" ]; then
            echo "base_url=https://zenodo.org" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://sandbox.zenodo.org" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish schemas to Zenodo
        env:
          ZENODO_TOKEN: ${{ steps.target.outputs.target == 'production' && secrets.ZENODO_TOKEN || secrets.ZENODO_SANDBOX_TOKEN }}
        run: |
          python3 .github/scripts/publish-zenodo.py \
            --zenodo-token "$ZENODO_TOKEN" \
            --zenodo-base-url "${{ steps.target.outputs.base_url }}" \
            --site-base-url "https://dicompare.neurodesk.org"

      - name: Commit updated DOI mapping
        id: commit
        run: |
          if git diff --quiet -- public/schemas/doi-mapping.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No DOI mapping changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/schemas/doi-mapping.json
          git commit -m "chore: update schema DOI mapping [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Redeploy site with new DOIs
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
